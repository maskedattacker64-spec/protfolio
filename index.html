<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Masked Attacker Chess</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
height:100%;
}

body{

font-family:Poppins,sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:18px;

background:
linear-gradient(rgba(0,0,0,.68),rgba(0,0,0,.82)),
url("bg.jpg");

background-size:cover;
background-position:left center;
background-repeat:no-repeat;
background-attachment:fixed;

overflow-x:hidden;

color:#fff;

}

.container{

width:100%;
max-width:470px;

background:rgba(10,10,10,.55);

backdrop-filter:blur(18px);

border:1px solid rgba(255,193,7,.15);

border-radius:28px;

padding:22px;

box-shadow:
0 0 40px rgba(255,193,7,.12);

}

.logo{

width:105px;
height:105px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:3px solid #FFC107;

box-shadow:0 0 25px rgba(255,193,7,.55);

}

.logo img{

width:100%;
height:100%;
object-fit:cover;

}

h1{

margin-top:14px;

text-align:center;

font-size:34px;

font-weight:800;

line-height:1;

}

.gold{

color:#FFC107;

}

.subtitle{

margin-top:10px;

text-align:center;

font-size:14px;

line-height:1.6;

color:#d8d8d8;

}

.links{

margin-top:22px;

display:flex;

flex-direction:column;

gap:12px;

}

.button{

display:flex;

align-items:center;

justify-content:space-between;

padding:14px 18px;

text-decoration:none;

background:rgba(18,18,18,.88);

border-radius:60px;

border:1px solid rgba(255,193,7,.18);

transition:.25s;

}

.button:hover{

transform:translateY(-2px);

border-color:#FFC107;

box-shadow:0 0 16px rgba(255,193,7,.35);

}

.left{

display:flex;

align-items:center;

gap:14px;

}

.icon{

width:48px;
height:48px;

border-radius:50%;

display:flex;

justify-content:center;
align-items:center;

font-size:20px;

background:#171717;

color:#FFC107;

border:2px solid rgba(255,193,7,.28);

flex-shrink:0;

}

.info h3{

font-size:17px;

font-weight:600;

}

.info span{

font-size:12px;

color:#bdbdbd;

}

.arrow{

font-size:18px;

color:#FFC107;

}

.footer{

margin-top:18px;

text-align:center;

font-size:13px;

color:#999;

}

/* Mobile */

@media(max-width:600px){

body{

padding:10px;

align-items:flex-start;

}

.container{

padding:16px;

border-radius:20px;

}

.logo{

width:85px;
height:85px;

}

h1{

font-size:27px;

}

.subtitle{

font-size:12px;

line-height:1.4;

}

.links{

gap:8px;

margin-top:18px;

}

.button{

padding:10px 14px;

}

.icon{

width:42px;
height:42px;

font-size:17px;

}

.info h3{

font-size:15px;

}

.info span{

font-size:11px;

}

.footer{

font-size:11px;

margin-top:14px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="logo.png">

</div>

<h1>

Masked <span class="gold">Attacker</span>

</h1>

<p class="subtitle">

♟ Chess Content • Live Streams • Courses<br>

Strategy • Tactics • Improvement

</p>

<div class="links">

<a class="button"
href="https://www.youtube.com/@MaskedAttacker64"
target="_blank">

<div class="left">

<div class="icon">

<i class="fab fa-youtube"></i>

</div>

<div class="info">

<h3>YouTube</h3>

<span>Videos & Live Streams</span>

</div>

</div>

<div class="arrow">

<i class="fas fa-chevron-right"></i>

</div>

</a>

<a class="button"
href="https://www.instagram.com/masked_attacker64/"
target="_blank">

<div class="left">

<div class="icon">

<i class="fab fa-instagram"></i>

</div>

<div class="info">

<h3>Instagram</h3>

<span>Daily Chess Posts</span>

</div>

</div>

<div class="arrow">

<i class="fas fa-chevron-right"></i>

</div>

</a>

<a class="button"
href="https://www.chess.com/member/masked_attacker64"
target="_blank">

<div class="left">

<div class="icon">

♔

</div>

<div class="info">

<h3>Chess.com</h3>

<span>Play Against Me</span>

</div>

</div>

<div class="arrow">

<i class="fas fa-chevron-right"></i>

</div>

</a>

<a class="button"
href="https://lichess.org/@/masked_attacker64"
target="_blank">

<div class="left">

<div class="icon">

♞

</div>

<div class="info">

<h3>Lichess</h3>

<span>Follow My Games</span>

</div>

</div>

<div class="arrow">

<i class="fas fa-chevron-right"></i>

</div>

</a>

</div>

<div class="footer">

♟ Masked Attacker Chess

</div>

</div>

</body>

</html>
